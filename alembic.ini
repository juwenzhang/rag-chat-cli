# ──────────────────────────────────────────────────────────────────────────
# Alembic config — the authoritative DB URL comes from settings.py via env.py.
# Do NOT set sqlalchemy.url here.
# ──────────────────────────────────────────────────────────────────────────

[alembic]
script_location = alembic
prepend_sys_path = .
# use "isort" ruff rule to keep import blocks tidy if autogenerate is used
version_path_separator = os
# Use package-relative imports inside versions/ files.
output_encoding = utf-8

# Default Python date format for new revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# Auto-format new revisions with ruff.
hooks = ruff,ruff_format
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
