name: ci

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    env:
      APP__ENV: dev
      AUTH__JWT_SECRET: ci-secret-not-for-prod-xxxxxxxxxxxxxxxx
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: websites/pnpm-lock.yaml
      - name: uv sync
        run: uv sync --extra dev
      - name: pnpm install
        run: pnpm --dir websites install --frozen-lockfile
      - name: backend quality
        run: uv run python scripts/quality.py backend
      - name: frontend quality
        run: uv run python scripts/quality.py frontend
      - name: commit message example
        run: |
          tmp=$(mktemp)
          echo "ci(repo): validate quality workflow" > "$tmp"
          python3 scripts/check_commit_msg.py "$tmp"
