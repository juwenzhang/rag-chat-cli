name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: uv sync
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: uv sync
        run: uv sync --extra dev
      - name: mypy --strict
        run: uv run mypy --strict . --explicit-package-bases

  test:
    name: test (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11"]
    env:
      APP__ENV: dev
      AUTH__JWT_SECRET: ci-secret-not-for-prod-xxxxxxxxxxxxxxxx
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: uv python install
        run: uv python install ${{ matrix.python }}
      - name: uv sync
        run: uv sync --extra dev --python ${{ matrix.python }}
      - name: pytest
        run: uv run pytest -q

  # Future jobs (gated behind the respective changes landing):
  #   - test-cov-strict  → once total ≥ 85 and core/ ≥ 90 are realistic
  #   - docker-build     → once docker/Dockerfile.app lands (containerize-with-docker-compose)
  #   - openapi-check    → once api/ + scripts/dump_openapi.py land (add-fastapi-rest-api)
