name: deploy hf backend

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-hf-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  push-space:
    name: push backend to Hugging Face Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build a backend-only snapshot and push to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: luhanxin
          HF_SPACE: rag-chat-backend
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "Missing GitHub secret: HF_TOKEN" >&2
            exit 1
          fi

          # ──────────────────────────────────────────────────────────────
          # HF Spaces' pre-receive hook rejects any binary file above a
          # small threshold unless it is stored via Xet / LFS. Our repo
          # carries README screenshots (docs/images/*.png), the Next.js
          # workspace, the Ink TUI source, the openspec docs and various
          # other frontend bits — none of which the FastAPI backend
          # image needs to build.
          #
          # We solve this by exporting a *single squashed snapshot* of
          # HEAD that contains only the paths the backend image cares
          # about, then force-pushing that one commit to the Space's
          # main branch. The Space therefore has no history to inherit
          # large blobs from and no working-tree files that trip the
          # binary-size hook.
          # ──────────────────────────────────────────────────────────────

          src_sha="$(git rev-parse HEAD)"
          src_short="$(git rev-parse --short HEAD)"

          # Materialise HEAD into a clean staging directory. Using
          # `git archive` would honour `export-ignore` attributes but
          # we want fully explicit control here, so we just copy what
          # we need with rsync.
          stage="$(mktemp -d)"
          rsync -a \
            --include='/api/***' \
            --include='/service/***' \
            --include='/alembic/***' \
            --include='/scripts/***' \
            --include='/deploy/***' \
            --include='/ollama/***' \
            --include='/minio/***' \
            --include='/settings.py' \
            --include='/alembic.ini' \
            --include='/pyproject.toml' \
            --include='/uv.lock' \
            --include='/Dockerfile' \
            --include='/docker-compose.yml' \
            --include='/Makefile' \
            --include='/.env.example' \
            --include='/.dockerignore' \
            --include='/README.md' \
            --include='/README.zh-CN.md' \
            --exclude='*' \
            ./ "${stage}/"

          # Drop ad-hoc development cruft that might have slipped in
          # under one of the included roots.
          find "${stage}" -type d -name '__pycache__' -prune -exec rm -rf {} +
          find "${stage}" -type f \
            \( -name '*.pyc' -o -name '*.pyo' -o -name '.DS_Store' \) -delete

          # README references docs/images/* which we intentionally
          # exclude from the Space. Rewrite the image links so the
          # HF Space README still renders without broken icons by
          # pointing them at github raw.
          owner_repo="${GITHUB_REPOSITORY}"   # juwenzhang/rag-chat-cli
          gh_raw="https://raw.githubusercontent.com/${owner_repo}/${src_sha}"
          # Use sed instead of a python heredoc to avoid yaml/shell
          # indentation traps. The pattern matches:
          #   ![alt](docs/images/foo.png)
          # and rewrites the docs/images/ prefix to the absolute raw
          # URL — alt text and the trailing ) stay intact.
          for md in "${stage}/README.md" "${stage}/README.zh-CN.md"; do
            [ -f "${md}" ] || continue
            sed -i.bak -E \
              "s|(!\\[[^]]*\\]\\()docs/images/|\\1${gh_raw}/docs/images/|g" \
              "${md}"
            rm -f "${md}.bak"
          done

          # Build a fresh single-commit history in the staging dir.
          cd "${stage}"
          git init -q -b main
          git config user.email "ci@github.actions"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -q -m "deploy: backend snapshot from ${owner_repo}@${src_short}

          Generated by .github/workflows/deploy-hf-backend.yml — the full
          source tree (including frontend, docs/images binaries and the
          Ink TUI workspace) lives at https://github.com/${owner_repo}."

          git remote add hf \
            "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${HF_SPACE}"
          # Force-push because every snapshot rewrites history; the Space
          # never needs to track ours commit-for-commit.
          git push --force hf main
