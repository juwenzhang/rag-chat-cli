# AGENTS.md §11 — lint/format/type-safety hooks.
#
# Install locally once:
#   uv run pre-commit install
#
# Run against the whole repo:
#   uv run pre-commit run --all-files
#
# The heavier `mypy` check is intentionally excluded from the commit hook
# (too slow for per-commit). CI runs it; devs can run `make typecheck`
# locally. A `pre-push` stage could be added later for mypy if desired.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

default_language_version:
  python: python3.10
