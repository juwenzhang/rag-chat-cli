services:
  ollama:
    image: ollama/ollama:latest
    container_name: test_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_PORT=11434
    restart: unless-stopped
    networks:
      - ragchat-network
    profiles: ["ollama", "web"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    # pgvector/pgvector ships Postgres 16 with the `vector` extension baked in.
    # AGENTS.md §4 requires pgvector for RAG; `pg_trgm` is enabled by the
    # init migration (0001_init.py).
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ragchat-network
    profiles: ["db", "web"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  ollama_data:
    driver: local
  pg_data:
    driver: local

networks:
  ragchat-network:
    driver: bridge
